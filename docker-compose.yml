version: "2.4"

services:
  selenoid:
    image: aerokube/selenoid:latest-release
    container_name: selenoid
    ports:
      - "4444:4444"
    networks:
      - selenoid
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./selenoid:/etc/selenoid:ro
      - ./selenoid-logs:/opt/selenoid/logs
    command:
      - "-conf"
      - "/etc/selenoid/browsers.json"
      - "-container-network"
      - "selenoid"
      - "-limit"
      - "5"
      - "-log-output-dir"
      - "/opt/selenoid/logs"

  selenoid-ui:
    image: aerokube/selenoid-ui:latest-release
    container_name: selenoid-ui
    ports:
      - "8090:8080"
    networks:
      - selenoid
    command:
      - "--selenoid-uri"
      - "http://selenoid:4444"
    depends_on:
      - selenoid

  phpadmin:
    image: "phpmyadmin/phpmyadmin:latest"
    environment:
      - PMA_HOST=mariadb
      - PMA_PORT=3306
      - PMA_USER=bn_opencart
    ports:
      - "${PHPADMIN_PORT:-8091}:80"
    networks:
      - selenoid
    depends_on:
      mariadb:
        condition: service_healthy

  mariadb:
    image: "bitnami/mariadb:latest"
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - MARIADB_USER=bn_opencart
      - MARIADB_DATABASE=bitnami_opencart
    ports:
      - "3306:3306"
    networks:
      - selenoid
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30

  opencart:
    image: agridyaev/opencart:4.0.2-3-debian-12-r33
    container_name: opencart
    ports:
      - "${OPENCART_PORT:-8088}:8080"
      - "443:8443"
    networks:
      - selenoid
    environment:
      # ВАЖНО для Selenoid: внутри сети открываем по имени сервиса
      - OPENCART_HOST=opencart:8080
      - OPENCART_DATABASE_HOST=mariadb
      - OPENCART_DATABASE_PORT_NUMBER=3306
      - OPENCART_DATABASE_USER=bn_opencart
      - OPENCART_DATABASE_NAME=bitnami_opencart
      - ALLOW_EMPTY_PASSWORD=yes
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      # внутри контейнера всегда 8080
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ >/dev/null 2>&1 || wget -qO- http://localhost:8080/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

  tests:
    build: .
    networks:
      - selenoid
    shm_size: "2gb"
    depends_on:
      opencart:
        condition: service_healthy
      selenoid:
        condition: service_started
    environment:
      - PYTHONPATH=/app
      - SELENOID_URL=http://selenoid:4444/wd/hub
    volumes:
      - ./allure-results:/app/allure-results
    command:
      ["test_web_3/","-v","--browser","chrome","--url","http://opencart:8080/","--alluredir=allure-results"]

networks:
  selenoid:
    external: true
    name: selenoid