services:
  selenoid1:
    image: aerokube/selenoid:latest-release
    container_name: selenoid1
    networks: [selenoid]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./selenoid/browsers.json:/etc/selenoid/browsers.json:ro
      - ./selenoid-logs:/opt/selenoid/logs
    command: ["-conf","/etc/selenoid/browsers.json","-container-network","selenoid","-limit","5","-log-output-dir","/opt/selenoid/logs"]


  selenoid2:
    image: aerokube/selenoid:latest-release
    container_name: selenoid2
    networks: [selenoid]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./selenoid/browsers.json:/etc/selenoid/browsers.json:ro
      - ./selenoid-logs:/opt/selenoid/logs
    command: ["-conf","/etc/selenoid/browsers.json","-container-network","selenoid","-limit","5","-log-output-dir","/opt/selenoid/logs"]

  ggr:
    image: aerokube/ggr:latest-release
    container_name: ggr
    networks: [selenoid]
    volumes:
      - ./ggr/quota:/etc/grid-router/quota:ro
    command: ["-listen",":5555","-quotaDir","/etc/grid-router/quota","-guests-allowed","-guests-quota","guest"]
    depends_on: [selenoid1, selenoid2]

  ggr-lb:
    image: nginx:stable-alpine
    container_name: ggr-lb
    networks: [selenoid]
    ports:
      - "4444:4444"
    volumes:
      - ./nginx/ggr.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [ggr]

  ggr-ui:
    image: aerokube/ggr-ui:latest-release
    container_name: ggr-ui
    networks: [selenoid]
    ports:
      - "8888:8888"
    volumes:
      - ./ggr/quota:/etc/grid-router/quota:ro
    command: ["-quota-dir","/etc/grid-router/quota","-listen",":8888","-guests-allowed","-guests-quota","guest"]
    depends_on: [ggr]

  selenoid-ui:
    image: aerokube/selenoid-ui:latest-release
    container_name: selenoid-ui
    networks: [selenoid]
    ports:
      - "8090:8080"
    command: ["--selenoid-uri","http://ggr-ui:8888"]
    depends_on: [ggr-ui]

  mariadb:
    image: bitnami/mariadb:latest
    container_name: mariadb
    networks: [selenoid]
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - MARIADB_USER=bn_opencart
      - MARIADB_DATABASE=bitnami_opencart
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30

  opencart:
    image: agridyaev/opencart:4.0.2-3-debian-12-r33
    container_name: opencart
    networks: [selenoid]
    ports:
      - "8088:8080"
    environment:
      - OPENCART_HOST=opencart:8080
      - OPENCART_DATABASE_HOST=mariadb
      - OPENCART_DATABASE_PORT_NUMBER=3306
      - OPENCART_DATABASE_USER=bn_opencart
      - OPENCART_DATABASE_NAME=bitnami_opencart
      - ALLOW_EMPTY_PASSWORD=yes
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ >/dev/null 2>&1 || wget -qO- http://localhost:8080/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

  tests:
    build: .
    container_name: tests
    networks: [selenoid]
    shm_size: "2gb"
    depends_on:
      opencart:
        condition: service_healthy
      ggr-lb:
        condition: service_started
    environment:
      - PYTHONPATH=/app
      - SELENOID_URL=http://ggr-lb:4444/wd/hub
    volumes:
      - ./allure-results:/app/allure-results
    entrypoint: ["pytest"]
    command: ["test_web_4/test_web_4.py","-v","--executor","ggr","--browser","chrome","--browser_version","125.0","--url","http://opencart:8080/","--alluredir=allure-results"]

networks:
  selenoid:
#    external: true
    name: selenoid
